    <style>
        :root {
            --bg-black: #000000;
            --card-gray: rgba(15, 15, 15, 0.7);
            --primary-blue: #007bff;
            --neon-cyan: #00f2fe;
            --neon-purple: #7000ff;
            --text-white: #ffffff;
            --text-dim: #b0b0b0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background-color: var(--bg-black); 
            color: var(--text-white); 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            line-height: 1.6;
            overflow-x: hidden;
            position: relative;
        }

        /* --- ✨ Ultra-Dynamic Animated Neon Background ✨ --- */
        .neon-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: var(--bg-black);
            overflow: hidden;
        }

        .neon-blob {
            position: absolute;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.35;
            animation: moveAround 20s infinite alternate ease-in-out;
        }

        .blob1 { background: var(--primary-blue); top: -10%; left: -10%; animation-duration: 25s; }
        .blob2 { background: var(--neon-purple); bottom: -10%; right: -10%; animation-duration: 30s; animation-delay: -5s; }
        .blob3 { background: var(--neon-cyan); top: 50%; left: 40%; animation-duration: 20s; animation-delay: -10s; }

        @keyframes moveAround {
            0% { transform: translate(0, 0) scale(1) rotate(0deg); }
            33% { transform: translate(100px, 200px) scale(1.2) rotate(120deg); }
            66% { transform: translate(-150px, 50px) scale(0.8) rotate(240deg); }
            100% { transform: translate(50px, -100px) scale(1.1) rotate(360deg); }
        }

        /* --- Header --- */
        header {
            position: relative;
            height: 100vh;
            width: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.6)), url('profile.JPG');
            background-size: cover;
            background-position: center;
            background-attachment: fixed; 
            z-index: 1;
        }

        header h1 { 
            font-size: clamp(3em, 10vw, 6em); 
            letter-spacing: 10px; 
            text-transform: uppercase; 
            text-shadow: 0 0 20px var(--primary-blue), 0 0 40px var(--neon-cyan);
            margin-bottom: 15px;
        }

        header p { 
            font-size: 1.2em; 
            color: var(--neon-cyan); 
            text-transform: uppercase; 
            letter-spacing: 3px; 
            font-weight: bold;
            text-shadow: 0 0 10px var(--primary-blue);
        }
