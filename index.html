<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="description" content="Nyi Nyi - Creative Marketer, Graphic Designer, and Multimedia Expert specialized in OBS Live Streaming and AI Generation.">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nyi Nyi | Creative Portfolio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css" />
    
    <style>
        :root {
            --bg-black: #050505;
            --card-gray: rgba(17, 17, 17, 0.8);
            --primary-blue: #007bff;
            --glow-blue: rgba(0, 123, 255, 0.4);
            --text-white: #ffffff;
            --text-dim: #b0b0b0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background-color: var(--bg-black); 
            color: var(--text-white); 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            line-height: 1.6;
            overflow-x: hidden;
            position: relative;
        }

        /* --- Animated Gradient Background Spots --- */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: 
                radial-gradient(circle at 10% 20%, rgba(0, 123, 255, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(0, 123, 255, 0.1) 0%, transparent 40%);
            z-index: -1;
            animation: moveGradient 15s infinite alternate;
        }

        @keyframes moveGradient {
            0% { transform: scale(1); }
            100% { transform: scale(1.2) translate(20px, 20px); }
        }

        /* --- Header --- */
        header {
            position: relative;
            height: 100vh;
            width: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.7)), url('profile.JPG');
            background-size: cover;
            background-position: center;
            background-attachment: fixed; 
            z-index: 1;
        }

        header h1 { 
            font-size: clamp(3em, 10vw, 6em); 
            letter-spacing: 10px; 
            text-transform: uppercase; 
            text-shadow: 0 0 30px var(--primary-blue);
            margin-bottom: 15px;
        }

        header p { 
            font-size: 1.2em; 
            color: var(--primary-blue); 
            text-transform: uppercase; 
            letter-spacing: 3px; 
            font-weight: bold;
        }

        /* --- Main Content --- */
        .main-content {
            position: relative;
            z-index: 2;
            padding-top: 50px;
            background: transparent;
        }

        .container { max-width: 1100px; margin: auto; padding: 0 25px; }

        h2 { 
            font-size: 2.2em; 
            margin: 60px 0 40px; 
            color: var(--primary-blue); 
            text-transform: uppercase; 
            border-left: 8px solid var(--primary-blue); 
            padding-left: 20px; 
        }

        .info-card { 
            background: var(--card-gray); 
            padding: 40px; 
            border-radius: 20px; 
            border: 1px solid rgba(255,255,255,0.05); 
            margin-bottom: 30px; 
            backdrop-filter: blur(10px); /* မှန်ကြည်လေးလိုမျိုး ဖြစ်အောင် */
        }

        /* Skills with Floating Animation */
        .skills-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 25px; }
        .skill-box { 
            background: var(--card-gray); 
            padding: 35px; 
            border-radius: 20px; 
            text-align: center; 
            border: 1px solid rgba(255,255,255,0.05); 
            transition: all 0.4s ease;
            backdrop-filter: blur(10px);
        }
        .skill-box:hover { transform: translateY(-12px); border-color: var(--primary-blue); box-shadow: 0 0 30px var(--glow-blue); }
        .skill-box i { font-size: 3em; color: var(--primary-blue); margin-bottom: 20px; animation: float 3s infinite ease-in-out; }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* Timeline */
        .timeline { border-left: 2px solid #333; padding-left: 40px; margin-left: 15px; }
        .timeline-item { position: relative; margin-bottom: 40px; }
        .timeline-item::before { content: ""; position: absolute; left: -49px; top: 5px; width: 16px; height: 16px; background: var(--primary-blue); border-radius: 50%; box-shadow: 0 0 15px var(--primary-blue); }

        /* Portfolio Grayscale Effect */
        .portfolio-grid { display: grid; gap: 20px; margin-bottom: 60px; }
        .grid-sq { grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); }
        .grid-flyer { grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); }
        
        .portfolio-grid img { 
            width: 100%; border-radius: 15px; border: 1px solid #333; object-fit: cover; cursor: pointer;
            filter: grayscale(100%);
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .portfolio-grid img:hover { 
            filter: grayscale(0%); transform: scale(1.05); border-color: var(--primary-blue); 
        }

        .img-sq { aspect-ratio: 1 / 1; }
        .img-flyer { aspect-ratio: 1 / 1.414; }

        /* Lightbox */
        .lightbox-modal {
            display: none; position: fixed; z-index: 999;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.95); justify-content: center; align-items: center;
        }
        .lightbox-modal img { max-width: 90%; max-height: 85%; border-radius: 10px; animation: zoomIn 0.3s ease; }
        .close-btn { position: absolute; top: 20px; right: 30px; color: #fff; font-size: 40px; cursor: pointer; }

        .contact-area {
