<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="description" content="Nyi Nyi - Creative Marketer, Graphic Designer, and Multimedia Expert specialized in OBS Live Streaming and AI Generation.">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nyi Nyi | Creative Portfolio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css" />
    
    <style>
        :root {
            --bg-black: #050505;
            --card-gray: rgba(18, 18, 18, 0.95);
            --primary-blue: #007bff;
            --neon-blue: #00f2fe;
            --glow-blue: rgba(0, 123, 255, 0.5);
            --text-white: #ffffff;
        }

        /* Smooth Scrolling */
        html { scroll-behavior: smooth; }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background-color: var(--bg-black); 
            color: var(--text-white); 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* --- 📱 New Navigation Bar --- */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
            background: rgba(5, 5, 5, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .nav-container {
            max-width: 1100px;
            margin: 0 auto;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px 20px;
        }

        .nav-links {
            display: flex;
            list-style: none;
            gap: 30px;
        }

        .nav-links a {
            text-decoration: none;
            color: white;
            font-size: 0.9em;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            transition: 0.3s;
            position: relative;
        }

        .nav-links a:hover { color: var(--neon-blue); }

        /* --- 🌈 Gradient Line Animation --- */
        .nav-gradient-line {
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--primary-blue), var(--neon-blue), transparent);
            background-size: 200% 100%;
            animation: gradient-flow 3s linear infinite;
        }

        @keyframes gradient-flow {
            0% { background-position: 100% 0%; }
            100% { background-position: -100% 0%; }
        }

        /* --- ✨ Smooth Scroll Background ✨ --- */
        .bg-wrapper {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        .blob {
            position: absolute;
            width: 60vw;
            height: 60vw;
            filter: blur(100px);
            opacity: 0.25;
            border-radius: 50%;
            will-change: transform;
        }
        .blob-1 { background: var(--primary-blue); top: -20%; left: -10%; }
        .blob-2 { background: #6f42c1; bottom: -20%; right: -10%; }

        /* --- 🚀 Enhanced Hero Section 🚀 --- */
        header {
            position: relative;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: linear-gradient(rgba(0,0,0,0.65), rgba(0,0,0,0.85)), url('profile.JPG') center/cover no-repeat;
            padding: 0 20px;
        }

        header h1 { 
            font-size: clamp(3em, 10vw, 6em); 
            letter-spacing: 12px; 
            text-transform: uppercase; 
            font-weight: 900;
            margin-bottom: 5px;
            background: linear-gradient(to bottom, #fff, #888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px var(--glow-blue));
        }

        .subtitle {
            font-size: 1.2em;
            color: var(--primary-blue);
            text-transform: uppercase;
            letter-spacing: 4px;
            font-weight: bold;
            min-height: 1.6em;
        }

        .hero-socials {
            margin-top: 30px;
            display: flex;
            gap: 25px;
        }

        .hero-socials a {
            color: white;
            font-size: 1.8em;
            transition: 0.4s;
            filter: drop-shadow(0 0 5px rgba(255,255,255,0.2));
        }

        .hero-socials a:hover {
            color: var(--primary-blue);
            transform: translateY(-5px);
            filter: drop-shadow(0 0 15px var(--primary-blue));
        }

        .scroll-down {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            opacity: 0.7;
        }

        .mouse {
            width: 25px;
            height: 40px;
            border: 2px solid white;
            border-radius: 20px;
            position: relative;
        }

        .wheel {
            width: 4px;
            height: 8px;
            background: var(--primary-blue);
            border-radius: 2px;
            position: absolute;
            top: 8px;
            left: 50%;
            transform: translateX(-50%);
            animation: scroll-anim 2s infinite;
        }

        @keyframes scroll-anim {
            0% { opacity: 1; transform: translate(-50%, 0); }
            100% { opacity: 0; transform: translate(-50%, 15px); }
        }

        .main-content { position: relative; z-index: 2; padding-top: 40px; }
        .container { max-width: 1100px; margin: auto; padding: 0 25px; }

        h2 { font-size: 2em; margin: 50px 0 30px; color: var(--primary-blue); text-transform: uppercase; border-left: 6px solid var(--primary-blue); padding-left: 15px; }

        .info-card { 
            background: var(--card-gray); 
            padding: 35px; 
            border-radius: 20px; 
            border: 1px solid rgba(255,255,255,0.05); 
            margin-bottom: 25px; 
            backdrop-filter: blur(10px);
        }

        .timeline { border-left: 2px solid #333; padding-left: 35px; margin-left: 10px; }
        .timeline-item { position: relative; margin-bottom: 30px; }
        .timeline-item::before { content: ""; position: absolute; left: -42px; top: 6px; width: 12px; height: 12px; background: var(--primary-blue); border-radius: 50%; box-shadow: 0 0 10px var(--primary-blue); }

        .skills-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        .skill-box { background: var(--card-gray); padding: 30px; border-radius: 20px; text-align: center; border: 1px solid rgba(255,255,255,0.05); transition: 0.3s ease; }
        .skill-box i { font-size: 2.8em; color: var(--primary-blue); margin-bottom: 20px; }

        .portfolio-grid { display: grid; gap: 15px; margin-bottom: 50px; }
        .grid-sq { grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); }
        .grid-flyer { grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); }
        
        .portfolio-grid img { width: 100%; border-radius: 12px; border: 1px solid #222; object-fit: cover; cursor: pointer; filter: grayscale(100%); transition: 0.5s ease; }
        .portfolio-grid img:hover { filter: grayscale(0%); transform: scale(1.03); border-color: var(--primary-blue); }
        .img-sq { aspect-ratio: 1 / 1; }
        .img-flyer { aspect-ratio: 1 / 1.414; }

        .contact-area { background: rgba(0, 31, 63, 0.4); padding: 60px 20px; text-align: center; border-radius: 30px; margin: 80px 0; border: 1px solid var(--primary-blue); }
        .contact-btn { display: inline-block; background: var(--primary-blue); color: #fff; padding: 15px 35px; margin: 10px; text-decoration: none; border-radius: 50px; font-weight: bold; transition: 0.3s; }

        .lightbox-modal { display: none; position: fixed; z-index: 999; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); justify-content: center; align-items: center; }
        .lightbox-modal img { max-width: 90%; max-height: 80%; border-radius: 10px; }
        .close-btn { position: absolute; top: 20px; right: 30px; color: #fff; font-size: 40px; cursor: pointer; }

        footer { text-align: center; padding: 40px 0; color: #555; }

        /* Responsive Menu for Mobile */
        @media (max-width: 600px) {
            .nav-links { gap: 15px; }
            .nav-links a { font-size: 0.7em; letter-spacing: 1px; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="nav-container">
            <ul class="nav-links">
                <li><a href="#about">About Me</a></li>
                <li><a href="#skills">Core Skills</a></li>
                <li><a href="#portfolio">Projects</a></li>
                <li><a href="#contact">Contact Me</a></li>
            </ul>
        </div>
        <div class="nav-gradient-line"></div>
    </nav>

    <div class="bg-wrapper">
        <div class="blob blob-1" id="blob1"></div>
        <div class="blob blob-2" id="blob2"></div>
    </div>

    <header>
        <div data-aos="fade-down" data-aos-duration="1500" style="display: flex; flex-direction: column; align-items: center
