    <style>
        :root {
            --bg-black: #050505;
            --card-gray: rgba(17, 17, 17, 0.8);
            --primary-blue: #007bff;
            --glow-blue: rgba(0, 123, 255, 0.4);
            --text-white: #ffffff;
            --text-dim: #b0b0b0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background-color: var(--bg-black); 
            color: var(--text-white); 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            line-height: 1.6;
            overflow-x: hidden;
            position: relative;
        }

        /* --- ✨ Interactive Scroll Background ✨ --- */
        #bg-canvas {
            position: fixed;
            top: -10%; left: -10%; width: 120%; height: 120%;
            z-index: -1;
            background: 
                radial-gradient(circle at var(--x1, 30%) var(--y1, 30%), rgba(0, 123, 255, 0.3) 0%, transparent 45%),
                radial-gradient(circle at var(--x2, 70%) var(--y2, 70%), rgba(112, 0, 255, 0.25) 0%, transparent 45%),
                radial-gradient(circle at var(--x3, 50%) var(--y3, 50%), rgba(0, 242, 254, 0.2) 0%, transparent 50%);
            filter: blur(50px);
            transition: all 0.2s ease-out; /* မြန်မြန်အလုပ်လုပ်အောင် transition ကို လျှော့ထားပါတယ် */
        }

        /* Header & Content (မပြောင်းလဲပါ) */
        header {
            position: relative;
            height: 100vh;
            width: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.7)), url('profile.JPG');
            background-size: cover;
            background-position: center;
            background-attachment: fixed; 
            z-index: 1;
        }

        header h1 { 
            font-size: clamp(3em, 10vw, 6em); letter-spacing: 10px; text-transform: uppercase; 
            text-shadow: 0 0 30px var(--primary-blue); margin-bottom: 15px;
        }

        header p { font-size: 1.2em; color: var(--primary-blue); text-transform: uppercase; letter-spacing: 3px; font-weight: bold; }

        .main-content { position: relative; z-index: 2; padding-top: 50px; background: transparent; }
        .container { max-width: 1100px; margin: auto; padding: 0 25px; }

        h2 { font-size: 2.2em; margin: 60px 0 40px; color: var(--primary-blue); text-transform: uppercase; border-left: 8px solid var(--primary-blue); padding-left: 20px; }

        .info-card { background: var(--card-gray); padding: 40px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.05); margin-bottom: 30px; backdrop-filter: blur(10px); }

        .skills-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 25px; }
        .skill-box { background: var(--card-gray); padding: 35px; border-radius: 20px; text-align: center; border: 1px solid rgba(255,255,255,0.05); transition: 0.4s; backdrop-filter: blur(10px); }
        .skill-box:hover { transform: translateY(-12px); border-color: var(--primary-blue); box-shadow: 0 0 30px var(--glow-blue); }
        .skill-box i { font-size: 3em; color: var(--primary-blue); margin-bottom: 20px; }

        .portfolio-grid { display: grid; gap: 20px; margin-bottom: 60px; }
        .grid-sq { grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); }
        
        .portfolio-grid img { width: 100%; border-radius: 15px; border: 1px solid #333; object-fit: cover; cursor: pointer; filter: grayscale(100%); transition: 0.6s; }
        .portfolio-grid img:hover { filter: grayscale(0%); transform: scale(1.05); border-color: var(--primary-blue); }
        .img-sq { aspect-ratio: 1 / 1; }

        .close-btn { position: absolute; top: 20px; right: 30px; color: #fff; font-size: 40px; cursor: pointer; }
